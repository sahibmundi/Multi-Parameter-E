kind = "mobile"
previewPath = "/envmonitor-mobile/"
title = "EnvMonitor Mobile"
version = "1.0.0"
id = "artifacts/envmonitor-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/envmonitor-mobile/" ]
localPort = 21380

[services.development]
run = "pnpm --filter @workspace/envmonitor-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/envmonitor-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/envmonitor-mobile", "run", "serve" ]

[services.env]
PORT = "21380"
BASE_PATH = "/envmonitor-mobile/"
